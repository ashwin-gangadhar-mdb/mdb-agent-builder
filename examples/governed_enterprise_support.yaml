# Governed enterprise support — MongoDB policies, audit, state, and retrieval.
#
# WHAT THIS EXAMPLE ENFORCES (v1):
#   • Tool RBAC — only tools listed in `permissions` are callable. The
#     `support_docs` tool requires the `tools.call.support_docs` permission.
#     Any tool not listed (including nl_to_mql, mongodb_toolkit, MCP) is
#     denied under governance.
#   • Retrieval scoping — vector_search receives a `pre_filter` that includes
#     `tenant_id`, `user_id`, and `classification: {$in: [public, internal]}`.
#     The full-text search tool similarly scopes via a `$match` stage.
#   • Blocked topics — phrases in `blocked_topics` are rejected at the input
#     guardrail.
#   • PII redaction + prompt injection detection (on by default).
#   • Audit events for every allow/deny tool call.
#
# WHAT IS NOT ENFORCED (v1 — deferred):
#   • nl_to_mql and mongodb_toolkit tools are always denied under governance
#     (they execute LLM-generated MQL without tenant scoping).
#   • MCP tools receive RBAC only; retrieval filtering is deferred.
#
# DEFAULT POLICY:
#   The `default_policy` below is permissive (`permissions` lists exactly
#   the tools you want callable).  If you deploy this without configuring
#   MongoDB-backed per-tenant policies, the default policy is applied to
#   every request.  This is fail-OPEN on permissions — a deliberate choice
#   to avoid breaking existing deployments.  For deployments that need
#   truly restrictive defaults, set `permissions: []` and define per-tenant
#   policies in MongoDB only — but note that the current default of
#   `permissions: ["*"]` is the framework-wide default that gets overridden
#   by this file.
embeddings:
  - name: local_embeddings
    provider: huggingface
    model_name: sentence-transformers/all-MiniLM-L6-v2

llms:
  - name: local_llm
    provider: ollama
    model_name: llama3.1
    temperature: 0.1
    additional_kwargs:
      base_url: ${OLLAMA_BASE_URL:-http://localhost:11434}

tools:
  - name: support_docs
    tool_type: vector_search
    description: Search authorized support documentation.
    connection_str: ${MONGODB_URI:-mongodb://localhost:27017}
    namespace: mdb_examples.support_docs
    embedding_model: local_embeddings
    additional_kwargs:
      index_name: vector_index
      text_field: text
      embedding_field: embedding
      top_k: 4
      min_score: 0.7

governance:
  enabled: true
  connection_str: ${MONGODB_URI:-mongodb://localhost:27017}
  db_name: mdb_examples_control_plane
  default_policy:
    permissions:
      - tools.call.support_docs
    denied_tools: []
    blocked_topics:
      - payroll export
    retrieval_filters:
      classification:
        - public
        - internal
  policy:
    provider: mongodb
    collection_name: agent_policies
  audit:
    enabled: true
    collection_name: agent_audit_events
  state:
    enabled: true
    collection_name: agent_sessions

agent:
  name: governed_enterprise_support
  agent_type: react
  llm: local_llm
  tools:
    - support_docs
  system_prompt_path: ./examples/prompts/governed_support_system.txt
