name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check agent_builder/

      - name: Type check with mypy
        run: mypy agent_builder/ --ignore-missing-imports

      - name: Run offline tests
        run: pytest tests/ -v

  orphaned-policy-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for orphaned AccessPolicy fields
        run: |
          set -euo pipefail
          POLICY_FIELDS=$(python3 -c "
          import ast, sys
          with open('agent_builder/core/types.py') as f:
              tree = ast.parse(f.read())
          # Find AccessPolicy dataclass fields
          for node in ast.walk(tree):
              if isinstance(node, ast.ClassDef) and node.name == 'AccessPolicy':
                  fields = []
                  for item in node.body:
                      if isinstance(item, ast.AnnAssign) and isinstance(item.target, ast.Name):
                          if item.target.id not in ('allows',):
                              fields.append(item.target.id)
                  print(' '.join(fields))
          ")
          echo "AccessPolicy fields: $POLICY_FIELDS"

          FAILED=0
          for field in $POLICY_FIELDS; do
            # policies.py is the canonical enforcement module; all policy
            # fields must be consumed there (in _policy_from_document /
            # _merge_policy_documents) or in guardrails.py.
            if ! grep -q "\b$field\b" agent_builder/security/policies.py agent_builder/security/guardrails.py; then
              echo "ERROR: AccessPolicy field '$field' has no enforcement call site in policies.py or guardrails.py"
              FAILED=1
            fi
          done
          exit $FAILED