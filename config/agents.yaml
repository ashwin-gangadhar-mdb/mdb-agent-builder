
# Configure the embedding model
embeddings:
 - name: voyage_embeddings
   provider: voyageai
   model_name: voyage-3.5-lite
   additional_kwargs:
    output_dimension: 512
 - name: bedrock-titan
   provider: bedrock
   model_name: amazon.titan-embed-text-v1

# Configure the language model
llms:
  - name: claude-3.5
    provider: bedrock
    model_name: anthropic.claude-3-5-sonnet-20240620-v1:0
    temperature: 0.7
    max_tokens: 4096

  # Grove API gateway (OpenAI-compatible). Routes through a single gateway
  # endpoint that can front multiple upstream providers. Set GROVE_API_BASE
  # and GROVE_API_KEY in the environment, or pass base_url/api_key inline.
  # - name: grove-claude
  #   provider: grove
  #   model_name: claude-3-5-sonnet        # model id as exposed by Grove
  #   temperature: 0.7
  #   max_tokens: 4096
  #   additional_kwargs:
  #     base_url: ${GROVE_API_BASE}        # e.g. https://grove.example.com/v1
  #     api_key: ${GROVE_API_KEY}
  #     default_headers:                   # optional extra gateway headers
  #       x-tenant-id: acme


# Configure agent tools
tools:
  - name: product_availability
    tool_type: full_text_search
    description: Checks product availability of the product in the MongoDB database
    connection_str: ${MONGODB_URI:-mongodb://localhost:27017}
    namespace: dr_reddys.product_inventory
    additional_kwargs:
      index_name: full_text_search_index
      text_field: search_text
      top_k: 5
  - name: product_information
    tool_type: vector_search
    description: Searches for relevant documents in the vector store to help with FAQ on dr reddys product information
    connection_str: ${MONGODB_URI:-mongodb://localhost:27017}
    namespace: dr_reddys.product_info
    embedding_model: voyage_embeddings  # Reference to the embedding model defined above
    additional_kwargs:
      index_name: vector_index
      top_k: 3
      min_score: 0.7
  - name: ai-memory
    tool_type: mcp
    description: MongoDB MCP Toolkit for advanced data operations
    servers_config:
      "ai-memory":
        url: "http://localhost:8080/mcp"
        transport: "streamable_http"
        filter:
          - store_memory
          - retrieve_memory
          - semantic_cache_response
  

# Standalone state persistence for multi-worker (Gunicorn) deployments.
# Workers share session history via MongoDB instead of process-local dicts.
# Use this when you don't need the full governance stack.
# This is independent of the governance section below — both can be active
# simultaneously, but only one state_provider will be created (governance takes
# precedence when governance.enabled is true).
#
# state:
#   enabled: true
#   connection_str: ${MONGODB_URI:-mongodb://localhost:27017}
#   db_name: agent_state
#   collection_name: agent_sessions

# Configure checkpointing
checkpointer:
  connection_str: ${MONGODB_URI:-mongodb://localhost:27017}
  db_name: dr_reddy_agent_state
  collection_name: checkpoints
  name: rag_agent_checkpointer

# Optional MongoDB-backed governance/control-plane configuration.
# Set enabled: true to enforce policies, audit guardrail events, and persist sessions.
governance:
  enabled: false
  connection_str: ${MONGODB_URI:-mongodb://localhost:27017}
  db_name: agent_control_plane
  default_policy:
    permissions:
      - "*"
  policy:
    provider: mongodb
    collection_name: agent_policies
  audit:
    enabled: true
    collection_name: agent_audit_events
  state:
    enabled: true
    collection_name: agent_sessions

